name: support-memory-sync

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/support_memory_reingest.mjs"
      - ".github/workflows/support-memory-sync.yml"
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"

concurrency:
  group: support-memory-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPPORT_RAG_PATHS: docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$OPENAI_API_KEY"

      - name: Incremental support memory sync
        run: npm run support:memory:sync
